{% extends 'base.html' %}

{% block title %}Iniciar Sesion{% endblock %}

{% block login_content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-parking"></i>
            <h1>Sistema de Aparcamiento</h1>
            <p>Inicia sesion para continuar</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username" class="required">Usuario</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label for="id_password" class="required">Contrasena</label>
                {{ form.password }}
            </div>
            
            <div class="form-group">
                <label>
                    {{ form.remember }} Recordarme
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesion
            </button>
        </form>
        
        <div class="login-footer">
            <p>No tienes cuenta? <a href="{% url 'registro' %}">Registrate</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
}

.login-card {
    background: white;
    padding: 40px;
    border-radius: var(--radius);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
}

.login-header {
    text-align: center;
    margin-bottom: 30px;
}

.login-header i {
    font-size: 48px;
    color: var(--primary);
    margin-bottom: 10px;
}

.login-header h1 {
    font-size: 24px;
    margin-bottom: 5px;
}

.login-header p {
    color: var(--gray);
}

.login-footer {
    text-align: center;
    margin-top: 20px;
    color: var(--gray);
}

.login-footer a {
    color: var(--primary);
    text-decoration: none;
}
</style>
{% endblock %}
