{% extends 'base.html' %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="container">
    <h2><i class="fas fa-user-circle"></i> Mi Perfil</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-user"></i> Datos Personales
                </div>
            </div>
            
            <div class="form-group">
                <label for="id_nombre">Nombre</label>
                {{ form.nombre }}
            </div>
            
            <div class="form-group">
                <label for="id_apellidos">Apellidos</label>
                {{ form.apellidos }}
            </div>
            
            <div class="form-group">
                <label for="id_email">Correo Electronico</label>
                {{ form.email }}
            </div>
            
            <div class="form-group">
                <label for="id_telefono">Telefono</label>
                {{ form.telefono }}
            </div>
            
            <div class="form-group">
                <label for="id_direccion">Direccion</label>
                {{ form.direccion }}
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-key"></i> Cambiar Contrasena
                </div>
            </div>
            
            <div class="form-group">
                <label for="id_password_actual">Contrasena Actual</label>
                <input type="password" id="id_password_actual" name="password_actual">
            </div>
            
            <div class="form-group">
                <label for="id_password_nuevo">Nueva Contrasena</label>
                <input type="password" id="id_password_nuevo" name="password_nuevo">
            </div>
            
            <div class="form-group">
                <label for="id_password_confirmar">Confirmar Nueva Contrasena</label>
                <input type="password" id="id_password_confirmar" name="password_confirmar">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Guardar Cambios
            </button>
        </div>
    </form>
</div>
{% endblock %}
