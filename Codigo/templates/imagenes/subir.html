{% extends 'base.html' %}

{% block title %}Captura de Imagen{% endblock %}

{% block content %}
<div class="container">
    <h2><i class="fas fa-camera"></i> Captura de Imagen</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-image"></i> Seleccionar Camara
                </div>
            </div>
            
            <div class="form-group">
                <label for="id_camara" class="required">Camara</label>
                {{ form.camara }}
            </div>
            
            <div class="form-group">
                <label for="id_nombre">Nombre de la Imagen</label>
                {{ form.nombre }}
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-upload"></i> Subir Imagen
                </div>
            </div>
            
            <div class="form-group">
                <label for="id_archivo" class="required">Archivo de Imagen</label>
                {{ form.archivo }}
            </div>
            
            <div class="form-group">
                <label for="id_nivel_privacidad">Nivel de Privacidad</label>
                {{ form.nivel_privacidad }}
            </div>
            
            <div class="form-group">
                <label for="id_comentarios">Comentarios</label>
                {{ form.comentarios }}
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Guardar Imagen
            </button>
            <a href="{% url 'imagenes:lista' %}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
        </div>
    </form>
</div>
{% endblock %}
